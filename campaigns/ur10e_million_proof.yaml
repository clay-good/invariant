# UR10e + Haas VF-2 Cell — 1 Million Command Proof Package
#
# The big one. 1,000,000 validated commands with every attack class.
# This is what you show to the bank, the insurer, and the customer.
#
# Expected result: 0 escapes across 1M commands.
# Statistical claim: escape rate < 0.0003% with 95% confidence.
#
# Runtime: ~45 seconds on Apple M-series, ~30 seconds on A100.
#
# Usage:
#   invariant campaign --config campaigns/ur10e_million_proof.yaml --key keys.json --dry-run

name: ur10e_million_command_proof
profile: ur10e_haas_cell
environments: 1
episodes_per_env: 100
steps_per_episode: 10000
scenarios:
  # 40% normal production cycles
  - scenario_type: baseline
    weight: 0.40

  # 10% boundary stress
  - scenario_type: aggressive
    weight: 0.10

  # 15% spatial safety (spindle zone, workspace escape)
  - scenario_type: exclusion_zone
    weight: 0.10
  - scenario_type: baseline
    weight: 0.05
    injections:
      - workspace_escape

  # 15% authority attacks
  - scenario_type: authority_escalation
    weight: 0.05
  - scenario_type: chain_forgery
    weight: 0.05
  - scenario_type: multi_agent_handoff
    weight: 0.05

  # 10% LLM hallucination
  - scenario_type: prompt_injection
    weight: 0.10

  # 10% fault injection
  - scenario_type: baseline
    weight: 0.10
    injections:
      - velocity_overshoot
      - torque_spike
      - position_violation
      - nan_injection
      - self_collision

success_criteria:
  min_legitimate_pass_rate: 0.98
  max_violation_escape_rate: 0.0
  max_false_rejection_rate: 0.02

version: 2
updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
    open-pull-requests-limit: 5
    ignore:
      # `rand_chacha` 0.9+ requires `rand_core` 0.9+, which is only ABI-
      # compatible with `rand` 0.9+. The workspace pins `rand = "0.8"` to
      # avoid the rand 0.9 API rename churn (`thread_rng()` → `rng()`,
      # `gen()` → `random()`, etc.). Pin manually; reconsider as part of
      # an explicit `rand 0.8 → 0.9` migration.
      - dependency-name: "rand_chacha"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - ci
    ignore:
      # `dtolnay/rust-toolchain` uses Rust release numbers as tags, not
      # action versions. Dependabot keeps trying to "bump" @1.75 (our MSRV
      # pin) to a non-existent Rust version like @1.100, which silently
      # breaks the MSRV CI job. We pin this manually; ignore all updates.
      - dependency-name: "dtolnay/rust-toolchain"

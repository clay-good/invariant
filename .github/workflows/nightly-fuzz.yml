name: Nightly fuzz

# Runs each cargo-fuzz target for 30 minutes against the seeded corpus
# (see fuzz/seed_corpora.sh, v12-N-20). Any new finding under fuzz/artifacts/
# opens a GitHub issue automatically. v11-5.10.

on:
  schedule:
    # 03:30 UTC daily.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Per-target fuzz duration (seconds)"
        required: false
        default: "1800"

permissions:
  contents: read
  issues: write

env:
  # 30 min default; manual runs can override via workflow_dispatch input.
  PER_TARGET_SECONDS: ${{ github.event.inputs.duration_seconds || '1800' }}
  CARGO_TERM_COLOR: always

jobs:
  fuzz:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - fuzz_command_json
          - fuzz_profile_json
          - fuzz_pca_chain
          - fuzz_validate_pipeline
          - bridge_handle_line
    steps:
      - uses: actions/checkout@v6

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "fuzz -> fuzz/target"

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Seed corpora from committed fixtures
        run: bash fuzz/seed_corpora.sh

      - name: Run ${{ matrix.target }} for ${{ env.PER_TARGET_SECONDS }}s
        working-directory: fuzz
        run: |
          set +e
          cargo fuzz run "${{ matrix.target }}" \
            -- -max_total_time=${PER_TARGET_SECONDS} -timeout=60 \
            > >(tee /tmp/fuzz-stdout.log) \
            2> >(tee /tmp/fuzz-stderr.log >&2)
          status=$?
          # cargo-fuzz exits non-zero on a crash. Re-export so the next
          # step can pick up the artifact and open an issue.
          echo "FUZZ_STATUS=${status}" >> "$GITHUB_ENV"
          exit 0

      - name: Collect artifacts
        if: env.FUZZ_STATUS != '0'
        working-directory: fuzz
        run: |
          mkdir -p /tmp/fuzz-artifacts
          if [ -d artifacts ]; then
            cp -r artifacts/* /tmp/fuzz-artifacts/ || true
          fi
          ls /tmp/fuzz-artifacts/ || echo "no artifacts collected"

      - uses: actions/upload-artifact@v4
        if: env.FUZZ_STATUS != '0'
        with:
          name: fuzz-artifacts-${{ matrix.target }}
          path: |
            /tmp/fuzz-artifacts/
            /tmp/fuzz-stdout.log
            /tmp/fuzz-stderr.log

      - name: Open issue on new finding
        if: env.FUZZ_STATUS != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const target = '${{ matrix.target }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `nightly fuzz: ${target} produced a finding`;
            const body = [
              `The nightly fuzz job for \`${target}\` exited non-zero.`,
              ``,
              `Run: ${runUrl}`,
              ``,
              `Artifacts and reproducer bytes are attached to the run as`,
              `\`fuzz-artifacts-${target}\`. Triage:`,
              ``,
              `1. Download the artifact.`,
              `2. Reproduce locally: \`cd fuzz && cargo fuzz run ${target} <reproducer>\`.`,
              `3. Either fix the crash or add the byte sequence to the`,
              `   corresponding entry in \`fuzz/corpus/${target}/\` and`,
              `   guard against it in source.`,
              ``,
              `Auto-opened by \`.github/workflows/nightly-fuzz.yml\` (v11-5.10).`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['fuzz', 'auto-opened'],
            });

      - name: Fail the job if fuzzing crashed
        if: env.FUZZ_STATUS != '0'
        run: |
          echo "::error::cargo-fuzz exited ${FUZZ_STATUS} for target ${{ matrix.target }}"
          exit 1

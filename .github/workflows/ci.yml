name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  msrv:
    name: MSRV (1.75)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.75
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  doc:
    name: Docs
    runs-on: ubuntu-latest
    # Pre-existing broken intra-doc links across the workspace; we still
    # build docs in CI but don't gate on warnings until those are cleaned up.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  python-tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest
      - run: python -m pytest isaac/tests -x -v
        env:
          INVARIANT_BINARY: target/release/invariant

  profile-sync:
    # Each domain crate ships its own copy of the JSON profiles (so that
    # `cargo publish` produces a self-contained tarball — `include_str!`
    # cannot reach above the package root). The root-level `profiles/`
    # directory is the source of truth users browse; the per-crate copies
    # must stay in sync with it.
    name: Profile sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: robotics profiles match root
        run: diff -r profiles/robotics/ crates/invariant-robotics/profiles/
      - name: biosynthesis profiles match root
        run: diff -r profiles/biosynthesis/ crates/invariant-biosynthesis/profiles/

  validate-profiles:
    # v11-5.3: every built-in profile must pass --strict validation.
    name: Validate profiles (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo run -p invariant --release -- robotics validate-profiles --strict

  version-drift:
    # v12-N-19: assert Cargo.toml ↔ CHANGELOG.md ↔ git tag agreement.
    name: Version drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check_version_drift.sh
